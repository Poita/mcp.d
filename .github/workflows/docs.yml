name: Docs

# Generate browsable API documentation from ddoc comments.
#
# - Always builds the docs on every push/PR (and release) so doc generation can
#   never silently break (the "docs generate in CI" acceptance criterion).
# - Publishes to GitHub Pages only on a published release (or a manual
#   workflow_dispatch), not on every push to main. Publishing is gated: it only
#   runs when Pages is enabled for the repository. If Pages is not available the
#   deploy step fails softly and the build job still succeeds.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build API docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: dmd-latest # adrdox's Makefile builds with dmd

      - name: Build and install adrdox
        run: |
          git clone --depth 1 https://github.com/adamdruppe/adrdox.git /tmp/adrdox
          make -C /tmp/adrdox
          echo "/tmp/adrdox" >> "$GITHUB_PATH"

      - name: Generate docs
        run: GENERATOR=adrdox OUTDIR=docs scripts/gen-docs.sh

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-docs
          path: docs/

      - name: Upload Pages artifact
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/

  publish-pages:
    name: Publish to GitHub Pages
    needs: build-docs
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # GitHub Pages allows one in-flight deployment at a time; without a shared
    # queue, two publishes started close together (e.g. two releases) supersede
    # each other and the superseded one is marked "failure". A dedicated `pages`
    # concurrency group with cancel-in-progress:false serialises them instead.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Publishing is best-effort: if Pages is not enabled for the repo the
    # deploy step fails softly without failing the workflow.
    continue-on-error: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
