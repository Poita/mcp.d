name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: dfmt format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: ldc-latest

      # dfmt has no `--check` flag, so the idiom is format-in-place then fail
      # if the working tree changed. The dfmt config lives in dfmt.json.
      - name: Check formatting (dfmt)
        run: |
          dub run dfmt -- --inplace source/ conformance/
          git diff --exit-code

  dscanner-lint:
    name: dscanner lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: ldc-latest

      # Runs `dub run dscanner -- --styleCheck source/` via the wrapper, using
      # the checks configured in dscanner.ini. The wrapper fails on any finding;
      # see scripts/dscanner-lint.sh for the documented false-positive filter.
      - name: D-Scanner static analysis
        run: ./scripts/dscanner-lint.sh

  build-and-test:
    name: ${{ matrix.compiler }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        compiler: [ldc-latest, dmd-latest]
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: ${{ matrix.compiler }}

      # OpenSSL 3.x is required by the `openssl` / vibe-d:tls dependency.
      # Ubuntu runners ship OpenSSL 3.x preinstalled; macOS needs it from Homebrew.
      - name: Install OpenSSL 3.x (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build
        run: dub build

      - name: Test
        run: dub test
