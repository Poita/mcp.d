name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: dfmt format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      # dfmt has no `--check` flag, so the idiom is format-in-place then fail
      # if the working tree changed. The dfmt config lives in dfmt.json.
      - name: Check formatting (dfmt)
        run: |
          dub run dfmt -- --inplace source/ conformance/
          git diff --exit-code

  dscanner-lint:
    name: dscanner lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      # Runs `dub run dscanner -- --styleCheck source/` via the wrapper, using
      # the checks configured in dscanner.ini. The wrapper fails on any finding;
      # see scripts/dscanner-lint.sh for the documented false-positive filter.
      - name: D-Scanner static analysis
        run: ./scripts/dscanner-lint.sh

  build-and-test:
    name: ${{ matrix.compiler }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        compiler: [ldc-latest, dmd-latest]
        os: [ubuntu-latest, macos-latest, windows-latest]
        # DMD ships no macOS/arm64 build and macos-latest is Apple Silicon,
        # so dmd-latest cannot install there; LDC covers macOS instead.
        # On Windows we gate on LDC (the recommended production toolchain there)
        # to get a clean signal before widening to DMD's MSVC link path.
        exclude:
          - compiler: dmd-latest
            os: macos-latest
          - compiler: dmd-latest
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{ matrix.compiler }}

      # OpenSSL 3.x is required by the `openssl` / vibe-d:tls dependency.
      # Ubuntu runners ship OpenSSL 3.x preinstalled; macOS needs it from Homebrew.
      - name: Install OpenSSL 3.x (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      # The windows-latest image ships OpenSSL 3.x under C:\Program Files\OpenSSL.
      # Point the linker at its import libraries so the `openssl` / vibe-d:tls
      # dependency resolves libssl/libcrypto. This wiring is the part most likely
      # to need adjustment from the first Windows CI run.
      - name: Configure OpenSSL 3.x (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ssl = "C:\Program Files\OpenSSL"
          if (-not (Test-Path $ssl)) { choco install openssl --no-progress -y; $ssl = "C:\Program Files\OpenSSL" }
          "OPENSSL_ROOT_DIR=$ssl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$ssl\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build
        run: dub build

      - name: Test
        run: dub test

  coverage:
    name: coverage to Codecov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      # `dub test --coverage` builds the unittest binary with code coverage
      # instrumentation and runs it, emitting one dmd-style `.lst` file per module
      # in the repo root.
      - name: Test with coverage
        run: dub test --coverage

      # Convert the `.lst` files to a single lcov report. lcov is ingested
      # reliably by Codecov, unlike D's `.lst` format + dub's dash-mangled
      # filenames. Prints the overall hit ratio to the log.
      - name: Convert coverage to lcov
        run: bash scripts/cov-to-lcov.sh lcov.info

      # On a PRIVATE repo this needs CODECOV_TOKEN in repo secrets AND the repo
      # activated on codecov.io; on a PUBLIC repo it uploads tokenlessly.
      # fail_ci_if_error stays false so a missing token / transient outage never
      # blocks CI.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  examples:
    name: examples (build + e2e)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      # Each examples/<name>/ is its own dub package (path-dependency on the root
      # mcp). The runner builds both the server and client configs and runs the
      # client as a self-verifying e2e test (stdio: client spawns the server;
      # http: start the server, run the client against it, check the exit code).
      - name: Build + run all examples
        run: ./scripts/run-examples.sh

  examples-windows:
    name: examples (stdio e2e, Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      - name: Configure OpenSSL 3.x (Windows)
        shell: pwsh
        run: |
          $ssl = "C:\Program Files\OpenSSL"
          if (-not (Test-Path $ssl)) { choco install openssl --no-progress -y }
          "OPENSSL_ROOT_DIR=$ssl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$ssl\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      # The stdio examples are the real exercise of the Windows threaded stdio
      # transport: the client spawns the server binary and round-trips MCP over a
      # real OS pipe (the in-memory unittests cannot reach this). elicitation and
      # sampling additionally drive server->client requests over stdio, validating
      # that the threaded reader preserves concurrency. The HTTP leg and its
      # background-server/pkill dance from run-examples.sh are skipped here (bash
      # process semantics are unreliable on the Windows runner); each client
      # self-verifies and exits non-zero on any mismatch.
      - name: stdio examples e2e
        shell: pwsh
        run: |
          $examples = @('tools','resources','elicitation','sampling','prompts')
          foreach ($e in $examples) {
            Write-Host "::group::stdio example $e"
            Push-Location "examples/$e"
            dub build -c server; if ($LASTEXITCODE) { Pop-Location; throw "build server: $e" }
            dub build -c client; if ($LASTEXITCODE) { Pop-Location; throw "build client: $e" }
            dub run -c client --quiet; if ($LASTEXITCODE) { Pop-Location; throw "stdio e2e: $e" }
            Pop-Location
            Write-Host "::endgroup::"
          }
          Write-Host "ALL WINDOWS STDIO EXAMPLES PASSED"
