name: Feature request
description: Propose a new feature or enhancement for the SDK.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Describe the problem you're trying to solve
        and the API or behavior you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this feature solve? What are you unable to do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you'd like. Sketch the public surface (McpServer / McpClient / RequestContext / UDA) if relevant.
      render: d
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered, and why you prefer the proposal.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, or anything else that helps explain the request.
    validations:
      required: false
