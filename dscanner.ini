[analysis.config.StaticAnalysisConfig]
; D-Scanner static-analysis configuration for the mcp.d SDK.
;
; The CI "dscanner lint" gate (.github/workflows/ci.yml) runs:
;     dub run dscanner -- --styleCheck source/
; and must exit cleanly. The checks below are tuned so the gate flags real
; correctness problems while allowing this codebase's deliberate conventions.
;
; --- Correctness checks (kept enabled) ---
enum_array_literal_check="enabled"
exception_check="enabled"
delete_check="enabled"
float_operator_check="enabled"
object_const_check="enabled"
backwards_range_check="enabled"
if_else_same_check="enabled"
constructor_check="enabled"
unused_variable_check="enabled"
unused_label_check="enabled"
;
; --- Disabled checks (documented exceptions) ---
;
; style_check: the public UDA layer is intentionally lowercase
; (@tool, @prompt, @resource, @resourceTemplate, @describe, @mcpHeader, ...)
; so it reads as an attribute at the use site. D-Scanner's naming rule would
; flag every one of these struct names, so the naming style check is disabled.
style_check="disabled"
;
; could_be_immutable_check: suggests const/immutable for locals that are only
; read. This is purely stylistic noise across the SDK (hundreds of hits on
; loop accumulators, decoded JSON values, etc.) and is not a correctness issue.
could_be_immutable_check="disabled"
;
; unused_parameter_check: handler/visitor/interface methods deliberately accept
; parameters they do not use (e.g. request/params/args in dispatch overrides)
; to satisfy a common signature. Flagging these adds noise without value.
unused_parameter_check="disabled"
;
; long_line_check: a handful of declarations and string literals exceed 120
; columns; dfmt (the authoritative formatter, see dfmt.json) governs layout.
long_line_check="disabled"
;
; number_style_check / undocumented_declaration_check: noisy / not required.
number_style_check="disabled"
undocumented_declaration_check="disabled"
